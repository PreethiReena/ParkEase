<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Booking History - ParkEase</title>
<link rel="stylesheet" href="Frame8.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="images/node-2.svg" alt="ParkEase Logo" />
      <h1>ParkEase</h1>
    </div>
    <div class="icons">
      <button class="user-icon" id="user-btn" aria-label="User Info">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12ZM12 14C8.13401 14 5 16.6863 5 20V21H19V20C19 16.6863 15.866 14 12 14Z" fill="black"/>
        </svg>
      </button>
      <button class="menu-icon" id="menu-btn" aria-label="Menu">&#9776;</button>
      <div class="dropdown" id="dropdown-menu" role="menu" aria-hidden="true">
        <button>Edit Profile</button>
        <button onclick="location.href='privacy.html'">Privacy Policy</button>
        <button onclick="location.href='aboutus.html'">About Us</button>
        <button onclick="location.href='faq.html'">Help & FAQ</button>
        <button id="logout" aria-haspopup="true">Log Out</button>
      </div>
      <div class="overlay" id="overlay" tabindex="-1"></div>
      <div class="user-info-box" id="user-info-box" role="dialog" aria-modal="true" aria-labelledby="user-info-label">
        <label id="user-info-label">User Name</label><input type="text" id="name" readonly />
        <label>Vehicle No</label><input type="text" id="vehicleNo" readonly />
        <label>Driving License No</label><input type="text" id="licenseNo" readonly />
        <label>Phone No</label><input type="text" id="mobile" readonly />
        <button class="close-btn" id="close-btn">Close</button>
      </div>
    </div>
  </header>

  

  <main>
    <h2>Your Booking History</h2>
    <table aria-label="Booking History Table" role="grid">
      <thead>
        <tr>
          <th scope="col">Booking ID</th>
          <th scope="col">Date</th>
          <th scope="col">Time</th>
          <th scope="col">Slot</th>
          <th scope="col">Vehicle Type</th>
          <th scope="col">Status</th>
          <th scope="col">Booking Details</th>
        </tr>
      </thead>
      <tbody id="booking-history-body">
        <tr><td colspan="7">Loading your booking history...</td></tr>
      </tbody>
    </table>
  </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, getDocs, setDoc,updateDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

 const firebaseConfig = {
    apiKey:"AIzaSyBwb9D1YwNilCidcoNCGQXljCcbiGivLIA",
    authDomain: "parkease-9d0a9.firebaseapp.com",
    projectId: "parkease-9d0a9",
    storageBucket: "parkease-9d0a9.firebasestorage.app",
    messagingSenderId: "85004166714",
    appId: "1:85004166714:web:ec328708f50a4997c8b703",
    measurementId: "G-3Z0L3ZYTG5"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const bookingTableBody = document.getElementById('booking-history-body');
  const userInfoBox = document.getElementById('user-info-box');
  const overlay = document.getElementById('overlay');

  // User info elements
  const userNameInput = document.getElementById('name');
  const vehicleNoInput = document.getElementById('vehicleNo');
  const licenseNoInput = document.getElementById('licenseNo');
  const mobileInput = document.getElementById('mobile');

  // Dropdown menu elements
  const menuBtn = document.getElementById('menu-btn');
  const dropdownMenu = document.getElementById('dropdown-menu');

  // Logout handler
  document.getElementById('logout').addEventListener('click', async () => {
    try {
      await signOut(auth);
      alert('Logged out successfully!');
      window.location.href = 'Frame2.html';
    } catch (error) {
      alert('Logout failed: ' + error.message);
    }
  });

  // Show/hide user info modal
  document.getElementById('user-btn').addEventListener('click', () => {
    userInfoBox.style.display = 'block';
    overlay.style.display = 'block';
  });

  document.getElementById('close-btn').addEventListener('click', () => {
    userInfoBox.style.display = 'none';
    overlay.style.display = 'none';
  });

  // Toggle dropdown menu
  menuBtn.addEventListener('click', (event) => {
    const isVisible = dropdownMenu.style.display === 'flex';
    dropdownMenu.style.display = isVisible ? 'none' : 'flex';
    dropdownMenu.style.flexDirection = 'column';
    dropdownMenu.style.position = 'absolute';
    dropdownMenu.style.top = '60px';
    dropdownMenu.style.right = '20px';
    dropdownMenu.style.background = 'white';
    dropdownMenu.style.borderRadius = '8px';
    dropdownMenu.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
    event.stopPropagation();
  });

  // Close dropdown on outside click
  document.addEventListener('click', (event) => {
    if (!menuBtn.contains(event.target) && !dropdownMenu.contains(event.target)) {
      dropdownMenu.style.display = 'none';
    }
  });

  // Utility to format Firebase timestamp to local date/time string
  function formatTimestamp(timestamp) {
    if (!timestamp) return '-';
    const dateObj = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    const dateString = dateObj.toLocaleDateString(undefined, {year: 'numeric', month: 'short', day: 'numeric'});
    const timeString = dateObj.toLocaleTimeString(undefined, {hour: '2-digit', minute: '2-digit'});
    return {dateString, timeString};
  }

  // Fetch and display user data for user info modal
  async function loadUserData(userId) {
    try {
      const userDoc = await getDoc(doc(db, 'Users', userId));
      if (userDoc.exists()) {
        const data = userDoc.data();
        userNameInput.value = data.name || '';
        vehicleNoInput.value = data.vehicleNo || '';
        licenseNoInput.value = data.licenseNo || '';
        mobileInput.value = data.mobile || '';
      }
    } catch (err) {
      console.error('Error loading user data:', err);
    }
  }

  // Main booking history fetch and display
  async function loadBookingHistory(userId) {
    try {
      // Clear any existing rows
      bookingTableBody.innerHTML = '<tr><td colspan="7">Loading booking history...</td></tr>';

      // Query carBookings and bikeBookings collections
      const carBookingsQuery = query(collection(db, 'carBookings'), where('userId', '==', userId));
      const bikeBookingsQuery = query(collection(db, 'bikeBookings'), where('userId', '==', userId));

      const [carSnaps, bikeSnaps] = await Promise.all([
        getDocs(carBookingsQuery),
        getDocs(bikeBookingsQuery)
      ]);

      let allBookings = [];

      carSnaps.forEach(docSnap => {
        const data = docSnap.data();
        allBookings.push({
          id: docSnap.id,
          slot: data.slot || '-',
          vehicleType: 'Car',
          bookedAt: data.bookedAt,
          bookedFrom: data.bookedFrom,
          bookedTo: data.bookedTo,
          isParked: data.isParked || false,
          cancelled: data.cancelled || false,
          collectionPath: 'carBookings',
          details: data.details || '',
        });
      });

      bikeSnaps.forEach(docSnap => {
        const data = docSnap.data();
        allBookings.push({
          id: docSnap.id,
          slot: data.slot || '-',
          vehicleType: 'Bike',
          bookedAt: data.bookedAt,
          bookedFrom: data.bookedFrom,
          bookedTo: data.bookedTo,
          isParked: data.isParked || false,
          cancelled: data.cancelled || false,
          collectionPath: 'bikeBookings',
          details: data.details || '',
        });
      });

      if (allBookings.length === 0) {
        bookingTableBody.innerHTML = '<tr><td colspan="7">No bookings found.</td></tr>';
        return;
      }

      // Sort bookings by date descending (most recent first)
      allBookings.sort((a, b) => {
        const aTime = a.bookedAt ? (a.bookedAt.toDate ? a.bookedAt.toDate().getTime() : new Date(a.bookedAt).getTime()) : 0;
        const bTime = b.bookedAt ? (b.bookedAt.toDate ? b.bookedAt.toDate().getTime() : new Date(b.bookedAt).getTime()) : 0;
        return bTime - aTime;
      });

      // Get current time for status comparison
      const currentTime = new Date();

      // Build table rows
      bookingTableBody.innerHTML = '';
      allBookings.forEach(booking => {
        const {dateString, timeString} = formatTimestamp(booking.bookedAt);
        
        // Format bookedFrom and bookedTo times for details
        const fromTime = booking.bookedFrom ? formatTimestamp(booking.bookedFrom) : null;
        const toTime = booking.bookedTo ? formatTimestamp(booking.bookedTo) : null;
        
        // Determine booking status based on times and flags
        let status;
        let statusClass;
        
        const fromDate = booking.bookedFrom && booking.bookedFrom.toDate ? 
                        booking.bookedFrom.toDate() : 
                        (booking.bookedFrom ? new Date(booking.bookedFrom) : null);
                        
        const toDate = booking.bookedTo && booking.bookedTo.toDate ? 
                      booking.bookedTo.toDate() : 
                      (booking.bookedTo ? new Date(booking.bookedTo) : null);
        
        if (booking.cancelled) {
          status = 'Cancelled';
          statusClass = 'status-cancelled';
        } else if (booking.isParked) {
          status = 'Active';
          statusClass = 'status-active';
        } else if (fromDate && toDate) {
          if (currentTime < fromDate) {
            // Future booking
            status = 'Confirmed';
            statusClass = 'status-confirmed';
          } else if (currentTime > toDate) {
            // Past booking
            status = 'Expired';
            statusClass = 'status-expired';
          } else {
            // Current time falls within booking period
            status = 'Active';
            statusClass = 'status-active';
          }
        } else {
          // Fallback for bookings without proper time data
          status = 'Unknown';
          statusClass = 'status-unknown';
        }
        
        let detailsText = booking.details || '';
        
        // Add booking time range to details
        if (fromTime && toTime) {
          detailsText += (detailsText ? '<br>' : '') + 
                        `From: ${fromTime.dateString} ${fromTime.timeString}<br>` + 
                        `To: ${toTime.dateString} ${toTime.timeString}`;
        }
        
        // If no details or time info, show a dash
        if (!detailsText) {
          detailsText = '-';
        }

        const tr = document.createElement('tr');
        
        // Add cancel button for confirmed bookings
        let cancelButton = '';
        if (status === 'Confirmed') {
          cancelButton = `<button class="cancel-booking-btn" data-id="${booking.id}" data-collection="${booking.collectionPath}">Cancel</button>`;
        }
        
        tr.innerHTML = `
          <td data-label="Booking ID">${booking.id}</td>
          <td data-label="Date">${dateString}</td>
          <td data-label="Time">${timeString}</td>
          <td data-label="Slot">${booking.slot}</td>
          <td data-label="Vehicle Type">${booking.vehicleType}</td>
          <td data-label="Status" class="${statusClass}">${status} ${cancelButton}</td>
          <td data-label="Booking Details">${detailsText}</td>
        `;
        bookingTableBody.appendChild(tr);
      });
      
      // Add event listeners for cancel buttons
      // Replace the cancel button event listener code with this updated version

      document.querySelectorAll('.cancel-booking-btn').forEach(button => {
  button.addEventListener('click', async (e) => {
    e.preventDefault();
    
    if (confirm('Are you sure you want to cancel this booking?')) {
      const bookingId = button.getAttribute('data-id');
      const collectionPath = button.getAttribute('data-collection');
      
      try {
        console.log(`Attempting to cancel booking: ${bookingId} from ${collectionPath}`);
        
        // 1. First get the booking data to know the slot that needs to be freed
        const bookingRef = doc(db, collectionPath, bookingId);
        const bookingSnap = await getDoc(bookingRef);
        
        if (bookingSnap.exists()) {
          const bookingData = bookingSnap.data();
          console.log("Booking data retrieved:", bookingData);
          
          // Mark booking as cancelled
          await updateDoc(bookingRef, {
            cancelled: true
          });
          
          // If the booking has a valid slot ID, free it in the slot collection
          if (bookingData.slot) {
            const slotId = bookingData.slot;
            console.log(`Attempting to free slot: ${slotId}`);
            
            // Determine which slot collection to update based on vehicle type
            const slotCollectionName = collectionPath === 'carBookings' ? 'carSlots' : 'bikeSlots';
            
            try {
              // First check if a document exists for this slot
              const slotDocRef = doc(db, slotCollectionName, slotId);
              const slotDoc = await getDoc(slotDocRef);
              
              if (slotDoc.exists()) {
                // Update the existing slot document
                await updateDoc(slotDocRef, {
                  isBooked: false,
                  bookedBy: null, // Remove the booking reference
                  lastUpdated: new Date() // Add timestamp for tracking
                });
                console.log(`Slot document ${slotId} updated successfully`);
              } else {
                // Create a new slot document if it doesn't exist
                await setDoc(slotDocRef, {
                  id: slotId,
                  isBooked: false,
                  slotName: slotId,
                  lastUpdated: new Date()
                });
                console.log(`Slot document ${slotId} created successfully`);
              }
            } catch (slotError) {
              console.error(`Error updating slot ${slotId}:`, slotError);
              // Continue with cancellation even if slot update fails
            }
          }
          
          // Update the UI immediately
          const parentRow = button.closest('tr');
          const statusCell = parentRow.querySelector('td[data-label="Status"]');
          if (statusCell) {
            statusCell.className = 'status-cancelled';
            statusCell.innerHTML = 'Cancelled';
          }
          
          alert('Booking cancelled successfully!');
        } else {
          console.error('Booking not found');
          throw new Error('Booking not found');
        }
      } catch (error) {
        console.error('Error cancelling booking:', error);
        alert(`Failed to cancel booking: ${error.message}`);
      }
    }
  });
});

    } catch (error) {
      console.error('Error loading booking history:', error);
      bookingTableBody.innerHTML = '<tr><td colspan="7">Failed to load booking history.</td></tr>';
    }
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      // Load user info modal data
      loadUserData(user.uid);
      
      // Load booking history
      loadBookingHistory(user.uid);
    } else {
      alert('Please login to view your booking history.');
      window.location.href = 'Frame2.html';
    }
  });
</script>
</body>
</html>
